name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
      - 'codex/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  repository-contracts:
    name: repository-contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate branch naming
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [[ "$BRANCH" =~ ^(main|develop|feature/.+|release/.+|hotfix/.+|codex/.+)$ ]]; then
            echo "Branch name accepted: $BRANCH"
          else
            echo "Unsupported branch name: $BRANCH"
            exit 1
          fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run repository contract validator
        run: python scripts/repository_contracts.py
